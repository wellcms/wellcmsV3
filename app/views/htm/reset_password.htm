<script ajax-eval="true">
    new GlobalFormHandler(".ajax-form", {
        ui: window.wellcms,
        timeout: 2,
        modalSize: "md"
    });
</script>

<?php if (1 === $view->get('step')): ?>
<script ajax-eval="true">
    bindClickID("send-code", function () {
        const anchorElement = document.querySelector("a[data-href]");
        const url = anchorElement ? anchorElement.getAttribute("data-href") : null;
        if (!url) return;

        const emailInput = document.querySelector('input[name="email"]');
        const emailValue = emailInput ? emailInput.value : null;

        const _tokenInput = document.querySelector('input[name="_token"]');
        const _tokenValue = _tokenInput ? _tokenInput.value : null;
        if (!_tokenValue) {
            console.error("Token error");
            return;
        }

        const data = {
            email: emailValue,
            _token: _tokenValue,
            key: 'resetPassword'
        };

        postRequest(url, data, function (response) {
            if (0 === response.code) {
                const send = document.getElementById("send-code");
                const completed = document.getElementById("sending-completed");
                const countdownElement = document.getElementById('countdown');
                let remainingTime = 60;
                const intervalId = setInterval(() => {
                    send.style.display = 'none';
                    completed.style.display = '';
                    countdownElement.style.display = '';
                    remainingTime--;
                    countdownElement.textContent = remainingTime;
                    if (remainingTime <= 0) {
                        clearInterval(intervalId);
                    }
                }, 1000);
                setTimeout(() => {
                    countdownElement.style.display = 'none';
                    send.style.display = '';
                    completed.style.display = 'none';
                }, 60000);
            } else {
                showAlert({ State: "Error", body: response.message }, 3, { size: "md", position: "center" });
            }
        });
    });
</script>
