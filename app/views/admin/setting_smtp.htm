<script>
	document.addEventListener("DOMContentLoaded", function () {
		document.addEventListener('click', async (e) => {
			const btn = e.target.closest('.ajax-delete');
			if (!btn) return;
			e.preventDefault();

			const url = btn.getAttribute('href');
			const row = btn.closest('tr');
			const id = btn.dataset.id;
			const confirmMsg = "<?php echo $view->get('language.confirm_delete'); ?>";

			wellcms.confirm(confirmMsg, async () => {
				try {
					const res = await wellcms.post(url, {
						id: id,
						_csrf_token: "<?php echo $view->e('csrf_token'); ?>"
					});

					if (res.code === 0) {
						wellcms.toast(res.message || "Deleted successfully", "success");
						if (row) {
							row.classList.add('opacity-0', 'transition-opacity', 'duration-500');
							setTimeout(() => row.remove(), 500);
						}
					} else {
						wellcms.error(res.message || "Deletion failed");
					}
				} catch (err) {
					wellcms.error("Network Error: " + err.message);
				}
			});
		});
	});
</script>
